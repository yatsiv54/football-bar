name: bar_app
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  go_router: ^17.0.0
  google_fonts: ^6.3.3
  drift: ^2.29.0
  drift_flutter: ^0.2.7
  path_provider: ^2.1.5
  path: ^1.9.1
  get_it: ^9.1.1
  shared_preferences: ^2.2.2
  qr_flutter: ^4.1.0
  intl: ^0.19.0
  audioplayers: ^6.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.29.0
  build_runner: ^2.10.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/icons/
    - assets/images/elipses/
    - assets/images/menu/
    - assets/images/teams/football/
    - assets/images/teams/hockey/
    - assets/images/info/
    - assets/images/welcome/
    - assets/data/
    - assets/audio/reactions/
